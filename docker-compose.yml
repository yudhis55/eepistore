services:
  postgres:
    image: postgres:16-alpine
    container_name: eepistore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eepistore
      POSTGRES_PASSWORD: eepistore
      POSTGRES_DB: eepistore
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eepistore -d eepistore"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: eepistore-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Allow the browser (origin :3000) to PUT uploads directly to MinIO via
      # presigned URLs. MinIO modern handles CORS at the server level, not via
      # the (removed) PutBucketCors bucket API.
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: eepistore-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      export MC_HOST_local='http://minioadmin:minioadmin@minio:9000';
      for i in $(seq 1 15); do
        mc ready local 2>/dev/null && break;
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb local/eepistore --ignore-existing;
      mc anonymous set download local/eepistore;
      echo 'MinIO bucket eepistore created + public-read';
      "
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: eepistore-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
