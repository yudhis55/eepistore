name: Runtime Security and Performance Evidence

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: HTTPS application URL created by Terraform
        required: true
        default: https://eepistore.web.id

permissions:
  contents: read

concurrency:
  group: runtime-evidence-production
  cancel-in-progress: false

jobs:
  evidence:
    name: Smoke, DAST, and Load Evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      APP_URL: ${{ inputs.target_url }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Runtime smoke checks
        run: bash scripts/runtime-smoke.sh "$APP_URL" runtime-evidence
      - name: OWASP ZAP baseline
        run: |
          set +e
          docker run --rm \
            -v "${{ github.workspace }}:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy@sha256:8d387b1a63e3425beef4846e39719f5af2a787753af2d8b6558c6257d7a577a2 \
            zap-baseline.py -t "$APP_URL" -J zap-report.json -r zap-report.html
          echo "$?" > zap-exit-code.txt
          set -e
          node scripts/zap-gate.mjs zap-report.json
      - name: k6 smoke load test
        run: |
          docker run --rm \
            -e APP_URL="$APP_URL" \
            -v "${{ github.workspace }}:/scripts" \
            grafana/k6@sha256:e7eeddf1ce2361df6920d925297f487c0ba549c44be242c6a9c22f28d9b08efa run \
            --summary-export /scripts/runtime-evidence/k6-summary.json \
            /scripts/tests/performance/smoke.js
      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-security-performance-evidence
          path: |
            runtime-evidence
            zap-report.json
            zap-report.html
            zap-exit-code.txt
          retention-days: 30
