name: Application CI and Image Publish

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      mode:
        description: Manual workflow mode
        required: true
        default: ci
        type: choice
        options: [ci, publish-image]

permissions:
  contents: read

concurrency:
  group: app-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  NODE_VERSION: "22"
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
  AUTH_SECRET: ci-build-secret-not-used-at-runtime
  AUTH_URL: http://localhost:3000
  S3_PUBLIC_BUCKET: eepistore-public-ci
  S3_PRIVATE_BUCKET: eepistore-private-ci
  S3_REGION: us-east-1
  S3_PUBLIC_BASE_URL: https://cdn.example.invalid

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run format:check
      - run: npm run lint -- --max-warnings=0
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
      - uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3

  sca:
    name: SCA (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Generate npm audit report
        run: npm audit --json > npm-audit.json || true
      - name: Enforce high and critical gate
        run: node scripts/audit-gate.mjs npm-audit.json
      - name: Upload SCA evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sca-evidence
          path: npm-audit.json
          retention-days: 30

  build-scan:
    name: Build, SBOM, and Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Build immutable candidate
        run: docker build -f docker/Dockerfile -t "eepistore-candidate:${GITHUB_SHA}" .
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: eepistore-candidate:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Trivy container gate
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy@sha256:e2b22eac59c02003d8749f5b8d9bd073b62e30fefaef5b7c8371204e0a4b0c08 \
            image \
            --format sarif \
            --output /work/trivy-image.sarif \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            "eepistore-candidate:${GITHUB_SHA}"
      - name: Upload scan evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-security-evidence
          path: |
            sbom.cdx.json
            trivy-image.sarif
          retention-days: 30
      - name: Export the scanned image
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'publish-image'
        run: docker save "eepistore-candidate:${GITHUB_SHA}" | gzip > candidate-image.tar.gz
      - name: Upload scanned image candidate
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'publish-image'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scanned-image-candidate
          path: candidate-image.tar.gz
          compression-level: 0
          retention-days: 1

  publish-image:
    name: Publish Scanned Image to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, sast, sca, build-scan]
    environment: production
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'publish-image'
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scanned-image-candidate
      - name: Load scanned image
        run: gunzip -c candidate-image.tar.gz | docker load
      - uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
      - name: Push the exact scanned image
        id: publish
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAGGED_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "eepistore-candidate:$IMAGE_TAG" "$TAGGED_URI"
          docker push "$TAGGED_URI"
          DIGEST="$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          DIGEST_URI="$ECR_REGISTRY/$ECR_REPOSITORY@$DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "digest_uri=$DIGEST_URI" >> "$GITHUB_OUTPUT"
          {
            echo "IMAGE_URI=$DIGEST_URI"
            echo "IMAGE_TAG=$IMAGE_TAG"
            echo "IMAGE_DIGEST=$DIGEST"
            echo "GIT_SHA=$GITHUB_SHA"
          } > image-metadata.env
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}
          subject-digest: ${{ steps.publish.outputs.digest }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: published-image
          path: image-metadata.env
          retention-days: 30
