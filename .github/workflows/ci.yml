name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      mode:
        description: "Manual workflow mode"
        required: true
        default: "ci"
        type: choice
        options:
          - ci
          - publish-image

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  NODE_VERSION: 22
  CI_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

jobs:
  quality:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      AUTH_SECRET: ci-build-secret-not-used-at-runtime
      AUTH_URL: http://localhost:3000
      S3_BUCKET: eepistore-ci
      S3_REGION: us-east-1
      S3_PUBLIC_BASE_URL: https://cdn.example.invalid
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  sca:
    name: SCA (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate npm audit report
        run: npm audit --json > npm-audit.json
        continue-on-error: true

      - name: Run npm audit gate
        run: node scripts/audit-gate.mjs npm-audit.json

      - name: Upload SCA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-evidence
          path: npm-audit.json
          if-no-files-found: ignore

  build-and-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [quality]
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      AUTH_SECRET: ci-build-secret-not-used-at-runtime
      AUTH_URL: http://localhost:3000
      S3_BUCKET: eepistore-ci
      S3_REGION: us-east-1
      S3_PUBLIC_BASE_URL: https://cdn.example.invalid
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t eepistore:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eepistore:ci
          format: table
          output: trivy-image.txt
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload container scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-evidence
          path: trivy-image.txt
          if-no-files-found: ignore

  publish-image:
    name: Publish Image to ECR
    runs-on: ubuntu-latest
    needs: [quality, sast, sca, build-and-scan]
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode == 'publish-image' &&
      vars.AWS_REGION != '' &&
      vars.ECR_REPOSITORY != ''
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f docker/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "$IMAGE_URI" > image-uri.txt
          {
            echo "IMAGE_URI=$IMAGE_URI"
            echo "IMAGE_TAG=$IMAGE_TAG"
            echo "GIT_SHA=${{ github.sha }}"
          } > image-metadata.env

      - name: Upload image publish evidence
        uses: actions/upload-artifact@v4
        with:
          name: published-image
          path: |
            image-uri.txt
            image-metadata.env

  deploy:
    name: Push Image + Deploy ECS
    runs-on: ubuntu-latest
    needs: [quality, sast, sca, build-and-scan]
    environment: production
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.AWS_REGION != '' &&
      vars.ECR_REPOSITORY != '' &&
      vars.ECS_CLUSTER != '' &&
      vars.ECS_SERVICE != ''
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f docker/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Register task definition with immutable image
        id: task-def
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          TASK_DEFINITION_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION_ARN" \
            --query 'taskDefinition' > current-task-definition.json

          jq --arg IMAGE_URI "$IMAGE_URI" '
            .containerDefinitions |= map(if .name == "app" then .image = $IMAGE_URI else . end)
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' current-task-definition.json > next-task-definition.json

          NEXT_TASK_DEFINITION_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://next-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "task_definition_arn=$NEXT_TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        id: migration
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          TASK_DEFINITION_ARN: ${{ steps.task-def.outputs.task_definition_arn }}
        run: |
          MIGRATION_TASK_ARN="$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASK_DEFINITION_ARN" \
            --count 1 \
            --started-by "github-${{ github.run_id }}-migration" \
            --overrides '{"containerOverrides":[{"name":"app","command":["node","node_modules/prisma/build/index.js","migrate","deploy"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)"

          if [ "$MIGRATION_TASK_ARN" = "None" ] || [ -z "$MIGRATION_TASK_ARN" ]; then
            echo "Failed to start migration task" >&2
            exit 1
          fi

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$MIGRATION_TASK_ARN"
          aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$MIGRATION_TASK_ARN" > migration-task.json

          EXIT_CODE="$(jq -r '.tasks[0].containers[] | select(.name == "app") | .exitCode // empty' migration-task.json)"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code ${EXIT_CODE:-missing}" >&2
            cat migration-task.json
            exit 1
          fi

      - name: Deploy ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${{ steps.task-def.outputs.task_definition_arn }}"

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"

      - name: Capture ECS deployment evidence
        if: always()
        run: |
          aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}" > ecs-service-after-deploy.json

      - name: Upload deploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence
          path: |
            migration-task.json
            ecs-service-after-deploy.json
          if-no-files-found: ignore

  post-deploy-evidence:
    name: ZAP + k6 Evidence
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success' && vars.APP_URL != ''
    steps:
      - uses: actions/checkout@v4

      - name: HTTPS, health, and readiness smoke checks
        run: |
          set -euo pipefail

          APP_URL="${{ vars.APP_URL }}"
          check_json_endpoint() {
            local name="$1"
            local url="$2"
            local status

            status="$(curl --silent --show-error --max-time 30 --output "$name.json" --write-out "%{http_code}" "$url")"
            if [[ "$status" != "200" ]]; then
              echo "Expected $url to return HTTP 200, got $status" >&2
              exit 1
            fi

            jq -e '.status == "ok"' "$name.json" > /dev/null
          }

          check_json_endpoint health "$APP_URL/api/health"
          check_json_endpoint readiness "$APP_URL/api/readiness"

          if [[ "$APP_URL" == https://* ]]; then
            HOST="${APP_URL#https://}"
            HOST="${HOST%%/*}"
            STATUS="$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 30 "http://$HOST/api/health")"
            if [[ "$STATUS" != "301" && "$STATUS" != "302" && "$STATUS" != "308" ]]; then
              echo "Expected HTTP to HTTPS redirect, got $STATUS" >&2
              exit 1
            fi
          fi

      - name: OWASP ZAP baseline scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "${{ vars.APP_URL }}" -J zap-report.json -r zap-report.html -I

      - name: k6 smoke load test
        run: |
          cat > k6-smoke.js <<'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';

          export const options = {
            vus: 10,
            duration: '1m',
            thresholds: {
              http_req_failed: ['rate<0.05'],
              http_req_duration: ['p(95)<1000'],
            },
          };

          export default function () {
            const res = http.get(`${__ENV.APP_URL}/api/health`);
            check(res, { 'health status is 200': (r) => r.status === 200 });
            sleep(1);
          }
          EOF

          docker run --rm \
            -e APP_URL="${{ vars.APP_URL }}" \
            -v "${{ github.workspace }}:/scripts" \
            grafana/k6:latest run --summary-export /scripts/k6-summary.json /scripts/k6-smoke.js

      - name: Upload security and performance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-evidence
          path: |
            health.json
            readiness.json
            zap-report.json
            zap-report.html
            k6-summary.json
          if-no-files-found: ignore
